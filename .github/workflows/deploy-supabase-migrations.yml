name: Deploy Supabase Migrations

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase-migrations.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

jobs:
  migrate-staging:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging
        run: supabase link --project-ref ngtsnskyupageagcmqdp
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push pending migrations to staging
        run: supabase db push --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}

  migrate-production:
    if: github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production
        run: supabase link --project-ref flpzqbvbymoluoeeeofg
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push pending migrations to production
        run: supabase db push --linked --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
